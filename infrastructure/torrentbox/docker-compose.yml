# Torrentbox (Pi 5, 192.168.10.141) — repo-committed Compose for the torrent stack.
#
# Topology change vs prior live-on-Pi state:
#   - NEW: gluetun sidecar (qmcgaw/gluetun) wraps Deluge in its own netns
#   - CHANGED: deluge runs with network_mode: service:gluetun (no own ports, no networks block)
#   - UNCHANGED: sonarr / radarr / prowlarr / flaresolverr / lidarr
#
# Default-deny kill-switch is enforced inside gluetun's netns by FIREWALL=on.
# If gluetun stops or the tunnel drops, deluge has no egress path — period.
#
# Deploy: rsync this directory to torrentbox:/home/john/docker/, ensure
# /home/john/docker/.env exists (gitignored, holds PIA creds), then
# `docker compose up -d`. See README.md for full procedure.

services:
  # ── VPN sidecar ──────────────────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun:v3.40.0
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      # Persistent state — critical for 60-day PIA PF token continuity (research R3)
      - /home/john/docker/gluetun:/gluetun
    env_file:
      - /home/john/docker/.env
    environment:
      # Provider + protocol
      # NOTE: gluetun v3.40.0 does not support PIA via WireGuard natively
      # (provider list excludes PIA). Using OpenVPN per research R2 fallback.
      # Re-evaluate WireGuard once PIA support lands upstream.
      VPN_SERVICE_PROVIDER: private internet access
      VPN_TYPE: openvpn
      # PIA US regions do not support port forwarding. CA Toronto is closest
      # PF-capable region to Denver (~50ms latency). Other options if Toronto
      # underperforms: CA Vancouver, CA Montreal.
      SERVER_REGIONS: CA Toronto
      OPENVPN_PROTOCOL: udp
      # Port forwarding
      # We intentionally do NOT use VPN_PORT_FORWARDING_UP_COMMAND because
      # gluetun's Alpine container has neither bash nor docker CLI. Instead
      # the host runs gluetun-port-hook.sh on a 1-minute cron, reading the
      # port from gluetun's bind-mounted piaportforward.json. See README.md.
      VPN_PORT_FORWARDING: on
      VPN_PORT_FORWARDING_PROVIDER: private internet access
      # Default-deny kill-switch — DO NOT widen FIREWALL_OUTBOUND_SUBNETS beyond LAN
      FIREWALL: on
      FIREWALL_OUTBOUND_SUBNETS: 192.168.10.0/24
      # Healthcheck targeting — avoid DNS-dependent flap loops (research R6)
      HEALTH_TARGET_ADDRESS: 1.1.1.1:443
      LOG_LEVEL: info
      TZ: America/Denver
    ports:
      # Deluge ports MUST be published HERE (on gluetun), not on deluge.
      # If you publish them on deluge, Docker attaches a bridge interface
      # and bypasses the kill-switch — silent leak. See research R5 T5.
      - 8112:8112    # Deluge Web UI
      - 58846:58846  # Deluge daemon RPC
    healthcheck:
      # Custom check that proves real external connectivity, not the stock
      # check (which has known false-positive flap loops — R6 issues #2942/#3021/#3069).
      test: ["CMD", "wget", "-qO-", "https://ipinfo.io/ip"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Torrent client (network-piggybacked on gluetun) ──────────────────────
  deluge:
    image: lscr.io/linuxserver/deluge:latest
    container_name: deluge
    # CRITICAL: omit `networks:` here. Compose silently reverts to the default
    # bridge if `networks:` is set alongside network_mode — see research R5
    # pitfall + bubuntux/nordvpn issue #94. Verify post-deploy with:
    #   docker inspect deluge | jq '.[0].HostConfig.NetworkMode'
    # Must read "container:<gluetun-id>".
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
      - DELUGE_LOGLEVEL=error
    volumes:
      - /home/john/docker/deluge:/config
      - /mnt/nas/torrents:/downloads
    # NO ports block — exposed via gluetun above.
    restart: unless-stopped

  # ── Discovered/managed services (unchanged from prior compose) ───────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - /home/john/docker/sonarr:/config
      - /mnt/nas/tv:/tv
      - /mnt/nas/torrents:/downloads
      - /mnt/media/TV:/travel-tv
    ports:
      - 8989:8989
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - /home/john/docker/radarr:/config
      - /mnt/nas/movies:/movies
      - /mnt/nas/torrents:/downloads
      - /mnt/media/Movies:/travel-movies
    ports:
      - 7878:7878
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - /home/john/docker/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=America/Denver
    ports:
      - 8191:8191
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - /home/john/docker/lidarr:/config
      - /mnt/nas/music:/music
      - /mnt/nas/torrents:/downloads
    ports:
      - 8686:8686
    restart: unless-stopped

  # ── Portainer Agent ──────────────────────────────────────────────────────
  # Exposes this host's Docker engine to the central Portainer server on
  # HOLYGRAIL (portainer.holygrail). Unencrypted TCP on 9001 is acceptable
  # here because the port is only reachable on the 192.168.10.0/24 LAN —
  # same trust boundary as the other management ports on this host.
  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - 9001:9001
    restart: unless-stopped
