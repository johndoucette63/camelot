# ARCHIVED — Torrentbox Monitoring Stack
# Status: Migrated to HOLYGRAIL (see infrastructure/holygrail/monitoring/)
# This file is kept for reference only. Do not deploy.
#
# Original: Network Latency Monitor Stack for Torrentbox
# Location was: /home/john/docker/monitoring/
# Note: Used existing host InfluxDB service (port 8086)

networks:
  monitoring:
    driver: bridge

volumes:
  grafana_data:
  smokeping_data:
  smokeping_config:

services:
  # Smokeping - Latency and packet loss monitoring
  smokeping:
    image: lscr.io/linuxserver/smokeping:latest
    container_name: smokeping
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "8080:80"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - smokeping_config:/config
      - smokeping_data:/data
      - ./smokeping/Targets:/config/Targets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Smokeping Exporter - Exports Smokeping data to InfluxDB
  smokeping-exporter:
    image: python:3.11-bookworm
    container_name: smokeping-exporter
    restart: unless-stopped
    networks:
      - monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - smokeping
    environment:
      - INFLUXDB_HOST=host.docker.internal
      - INFLUXDB_PORT=8086
      - INFLUXDB_DB=network_metrics
      - INFLUXDB_USER=grafana
      - INFLUXDB_PASSWORD=grafanapass
      - SMOKEPING_DATA_DIR=/smokeping-data
    volumes:
      - smokeping_data:/smokeping-data:ro
      - ./scripts/smokeping_exporter.py:/app/smokeping_exporter.py:ro
      - ./scripts/requirements-exporter.txt:/app/requirements.txt:ro
    working_dir: /app
    command: >
      bash -c "apt-get update && apt-get install -y --no-install-recommends rrdtool && pip install -q -r requirements.txt && python smokeping_exporter.py"

  # Speedtest Runner - Periodic bandwidth tests
  speedtest:
    image: python:3.11-slim
    container_name: speedtest
    restart: unless-stopped
    networks:
      - monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - INFLUXDB_HOST=host.docker.internal
      - INFLUXDB_PORT=8086
      - INFLUXDB_DB=network_metrics
      - INFLUXDB_USER=grafana
      - INFLUXDB_PASSWORD=grafanapass
      - SPEEDTEST_INTERVAL=86400  # 24 hours in seconds (daily — keeps WAN usage under monthly cap)
    volumes:
      - ./scripts/speedtest_logger.py:/app/speedtest_logger.py:ro
      - ./scripts/requirements-speedtest.txt:/app/requirements.txt:ro
    working_dir: /app
    command: >
      bash -c "pip install -q -r requirements.txt && python speedtest_logger.py"

  # Grafana - Visualization dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=networkmon
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://192.168.10.141:3000
      # Removed plugins - piechart is deprecated (Angular) and clock times out on download
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
