# Mosquitto configuration for the Frigate NVR stack.
#
# Two listeners:
#   - 1883 (default): reachable only from the `frigate-internal` compose network.
#     Used by Frigate → Mosquitto. Not published to the host.
#   - 1884: LAN listener for Home Assistant (published to the host in docker-compose.yml).
#
# Auth is mandatory on both listeners; ACL restricts the `homeassistant`
# user to subscribe-only on frigate/# plus publish on the `/set` topics.
# See contracts/mqtt-topics.md for the full contract.

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ── Internal listener (Frigate ↔ Mosquitto) ────────────────────────────────
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwords
acl_file /mosquitto/config/acl

# ── LAN listener (Home Assistant) ──────────────────────────────────────────
listener 1884
allow_anonymous false
password_file /mosquitto/config/passwords
acl_file /mosquitto/config/acl

# ── Drop-in directory for bridges, secrets, and per-host overrides ────────
# Files in conf.d/ are gitignored — they hold the actual bridge credentials
# (HA Mosquitto add-on bridge user, etc.). See conf.d/bridge.conf on HOLYGRAIL.
include_dir /mosquitto/config/conf.d
