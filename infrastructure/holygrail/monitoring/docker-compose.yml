# Monitoring Stack — HOLYGRAIL
# Grafana + InfluxDB + Smokeping + Exporter + Speedtest
#
# Prerequisites:
#   1. docker network create holygrail-proxy
#   2. cp .env.example .env  (fill in credentials)
#   3. docker compose up -d
#
# Configs mounted from infrastructure/monitoring/ in the Camelot repo.
# On HOLYGRAIL, copy those to ~/docker/monitoring/ alongside this file.

networks:
  monitoring:
    driver: bridge
  holygrail-proxy:
    external: true

volumes:
  influxdb_data:
  grafana_data:
  smokeping_data:
  smokeping_config:

services:
  # InfluxDB 1.8 — Time-series database
  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    restart: unless-stopped
    networks:
      - monitoring
      - holygrail-proxy
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=network_metrics
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - INFLUXDB_USER=${INFLUXDB_USER}
      - INFLUXDB_USER_PASSWORD=${INFLUXDB_USER_PASSWORD}
    volumes:
      - influxdb_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Smokeping — Latency and packet loss monitoring
  smokeping:
    image: lscr.io/linuxserver/smokeping:latest
    container_name: smokeping
    restart: unless-stopped
    networks:
      - monitoring
      - holygrail-proxy
    ports:
      - "8081:80"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/Denver}
    volumes:
      - smokeping_config:/config
      - smokeping_data:/data
      - ./smokeping/Targets:/config/Targets:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.smokeping.rule=Host(`smokeping.holygrail`)
      - traefik.http.routers.smokeping.entrypoints=web
      - traefik.http.services.smokeping.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Smokeping Exporter — Parses RRD data, writes to InfluxDB
  smokeping-exporter:
    image: python:3.11-bookworm
    container_name: smokeping-exporter
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      influxdb:
        condition: service_healthy
      smokeping:
        condition: service_started
    environment:
      - INFLUXDB_HOST=influxdb
      - INFLUXDB_PORT=8086
      - INFLUXDB_DB=network_metrics
      - INFLUXDB_USER=${INFLUXDB_USER}
      - INFLUXDB_PASSWORD=${INFLUXDB_USER_PASSWORD}
      - SMOKEPING_DATA_DIR=/smokeping-data
    volumes:
      - smokeping_data:/smokeping-data:ro
      - ./scripts/smokeping_exporter.py:/app/smokeping_exporter.py:ro
      - ./scripts/requirements-exporter.txt:/app/requirements.txt:ro
    working_dir: /app
    command: >
      bash -c "apt-get update && apt-get install -y --no-install-recommends rrdtool && pip install -q -r requirements.txt && python smokeping_exporter.py"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.kill(1, 0)' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Speedtest — Periodic bandwidth tests every 30 minutes
  speedtest:
    image: python:3.11-slim
    container_name: speedtest
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - INFLUXDB_HOST=influxdb
      - INFLUXDB_PORT=8086
      - INFLUXDB_DB=network_metrics
      - INFLUXDB_USER=${INFLUXDB_USER}
      - INFLUXDB_PASSWORD=${INFLUXDB_USER_PASSWORD}
      - SPEEDTEST_INTERVAL=1800
    volumes:
      - ./scripts/speedtest_logger.py:/app/speedtest_logger.py:ro
      - ./scripts/requirements-speedtest.txt:/app/requirements.txt:ro
    working_dir: /app
    command: >
      bash -c "pip install -q -r requirements.txt && python speedtest_logger.py"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.kill(1, 0)' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Grafana — Visualization dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - monitoring
      - holygrail-proxy
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://grafana.holygrail
      - INFLUXDB_USER=${INFLUXDB_USER}
      - INFLUXDB_USER_PASSWORD=${INFLUXDB_USER_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.holygrail`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
