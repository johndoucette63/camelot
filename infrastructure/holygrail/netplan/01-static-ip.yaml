# HOLYGRAIL Static IP Configuration
# Netplan 1.0 format for Ubuntu Server 24.04 LTS
#
# IMPORTANT: Verify the interface name before applying.
# Run `ip link` on HOLYGRAIL and replace 'enp7s0' below with
# the actual Ethernet interface name (Ryzen AM5 systems
# typically use enp*-prefixed names).
#
# Apply with: sudo netplan apply

network:
  version: 2
  ethernets:
    enp7s0:
      dhcp4: false
      addresses:
        - 192.168.10.129/24
      routes:
        - to: default
          via: 192.168.10.1
      nameservers:
        addresses:
          - 192.168.10.150
          - 8.8.8.8
