# Traefik File Provider — Static routes for host-network services
# These services can't use Docker labels because they run in host network mode.

http:
  routers:
    plex:
      rule: "Host(`plex.holygrail`)"
      entryPoints:
        - web
      service: plex

    traefik-dashboard:
      rule: "Host(`traefik.holygrail`)"
      entryPoints:
        - web
      service: api@internal

  services:
    plex:
      loadBalancer:
        servers:
          - url: "http://192.168.10.129:32400"
