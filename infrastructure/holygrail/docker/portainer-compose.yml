# Portainer CE — Container Management Web UI
# Deploy with: docker compose -f portainer-compose.yml up -d
# Access at: https://192.168.10.129:9443 or http://portainer.holygrail
#
# Prerequisite: docker network create holygrail-proxy

networks:
  holygrail-proxy:
    external: true

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    networks:
      - holygrail-proxy
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.portainer.rule=Host(`portainer.holygrail`)
      - traefik.http.routers.portainer.entrypoints=web
      - traefik.http.services.portainer.loadbalancer.server.port=9000
      - traefik.http.services.portainer.loadbalancer.server.scheme=http
volumes:
  portainer_data:
