# Vaultwarden — HOLYGRAIL
# Self-hosted Bitwarden-compatible password vault.
# LAN-only; remote access is via the existing VPN.
#
# Prerequisites:
#   1. docker network create holygrail-proxy   (already created for Traefik)
#   2. cp .env.example .env  &&  fill in ADMIN_TOKEN
#      (generate hash: docker run --rm vaultwarden/server /vaultwarden hash)
#   3. Add A-record on Pi-hole:  vault.holygrail -> 192.168.10.129
#      (or wildcard *.holygrail if already configured)
#   4. docker compose up -d
#
# Deploy from Mac:
#   rsync -av --exclude='.env' infrastructure/holygrail/vaultwarden/ \
#         holygrail:/home/john/docker/vaultwarden/
#   ssh holygrail "cd /home/john/docker/vaultwarden && docker compose up -d"

networks:
  holygrail-proxy:
    external: true

volumes:
  vaultwarden_data:

services:
  vaultwarden:
    image: vaultwarden/server:${VAULTWARDEN_IMAGE_TAG:-1.32.7}
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - holygrail-proxy
    environment:
      - DOMAIN=${DOMAIN:-http://vault.holygrail}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - SIGNUPS_ALLOWED=${SIGNUPS_ALLOWED:-true}
      - SIGNUPS_VERIFY=${SIGNUPS_VERIFY:-false}
      - INVITATIONS_ALLOWED=${INVITATIONS_ALLOWED:-true}
      - WEBSOCKET_ENABLED=true
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - TZ=${TZ:-America/Denver}
    volumes:
      - vaultwarden_data:/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=holygrail-proxy
      # HTTP -> HTTPS redirect (vault only — other *.holygrail services
      # stay on plain HTTP).
      - traefik.http.routers.vaultwarden-http.rule=Host(`vault.holygrail`)
      - traefik.http.routers.vaultwarden-http.entrypoints=web
      - traefik.http.routers.vaultwarden-http.service=vaultwarden
      - traefik.http.routers.vaultwarden-http.middlewares=vaultwarden-redirect
      - traefik.http.middlewares.vaultwarden-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.vaultwarden-redirect.redirectscheme.permanent=true
      # HTTPS web vault + API (Web Crypto requires a secure context)
      - traefik.http.routers.vaultwarden.rule=Host(`vault.holygrail`)
      - traefik.http.routers.vaultwarden.entrypoints=websecure
      - traefik.http.routers.vaultwarden.tls=true
      - traefik.http.routers.vaultwarden.service=vaultwarden
      - traefik.http.services.vaultwarden.loadbalancer.server.port=80
      # WebSocket for live sync (same host, /notifications/hub path)
      - traefik.http.routers.vaultwarden-ws.rule=Host(`vault.holygrail`) && PathPrefix(`/notifications/hub`)
      - traefik.http.routers.vaultwarden-ws.entrypoints=websecure
      - traefik.http.routers.vaultwarden-ws.tls=true
      - traefik.http.routers.vaultwarden-ws.service=vaultwarden-ws
      - traefik.http.services.vaultwarden-ws.loadbalancer.server.port=3012
    # Healthcheck deliberately omitted — the image ships its own
    # /healthcheck.sh (curl-based, hits /alive). Defining one here would just
    # shadow it. Traefik v3.6+ filters "starting" containers from discovery,
    # so the image's 60s start-up window is the soonest the router appears.
