services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-advisor}
      POSTGRES_USER: ${POSTGRES_USER:-john}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - advisor_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-john} -d ${POSTGRES_DB:-advisor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - advisor

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-john}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-advisor}}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama.holygrail}
      TZ: ${TZ:-America/Denver}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - advisor

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.advisor.rule=Host(`advisor.holygrail`)
      - traefik.http.routers.advisor.entrypoints=web
      - traefik.http.services.advisor.loadbalancer.server.port=80
    networks:
      - advisor
      - holygrail-proxy

volumes:
  advisor_pgdata:

networks:
  advisor:
  holygrail-proxy:
    external: true
