services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-advisor}
      POSTGRES_USER: ${POSTGRES_USER:-john}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - advisor_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-john} -d ${POSTGRES_DB:-advisor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - advisor

  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Host SSH key for the vpn_leak watchdog (ssh torrentbox docker exec ...).
      # Mounted at /etc/ssh-keys; entrypoint.sh copies into /root/.ssh with
      # correct ownership (openssh refuses cross-owner key files).
      - /home/john/.ssh:/etc/ssh-keys:ro
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-john}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-advisor}}
      # Default to the ollama container hostname on the holygrail-proxy
      # network so the advisor chat can reach Ollama directly (Traefik is
      # only needed for LAN-facing browser traffic, not container→container).
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      # VPN watchdog probe target — uses host's ~/.ssh/config alias
      VPN_PROBE_SSH_TARGET: ${VPN_PROBE_SSH_TARGET:-torrentbox}
      VPN_LEAK_DENYLIST_IPS: ${VPN_LEAK_DENYLIST_IPS:-67.176.27.48}
      # Feature 016 — HA integration. Fernet key for encrypting the HA
      # long-lived access token at rest; the backend refuses to start if
      # unset or malformed (Constitution V: silent failures unacceptable).
      ADVISOR_ENCRYPTION_KEY: "${ADVISOR_ENCRYPTION_KEY:?ADVISOR_ENCRYPTION_KEY is required}"
      HA_POLL_INTERVAL_SECONDS: ${HA_POLL_INTERVAL_SECONDS:-60}
      HA_REQUEST_TIMEOUT_SECONDS: ${HA_REQUEST_TIMEOUT_SECONDS:-10}
      HA_NOTIFY_RETRY_BUDGET_SECONDS: ${HA_NOTIFY_RETRY_BUDGET_SECONDS:-300}
      TZ: ${TZ:-America/Denver}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - advisor
      - holygrail-proxy

  scanner:
    build: ./backend
    restart: unless-stopped
    command: ["python", "scanner_entrypoint.py"]
    network_mode: host
    environment:
      # Uses 127.0.0.1 because scanner is on host network; postgres port is exposed to host
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-john}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB:-advisor}
      SCAN_INTERVAL_SECONDS: ${SCAN_INTERVAL_SECONDS:-900}
      SCAN_TARGET: ${SCAN_TARGET:-192.168.10.0/24}
      TZ: ${TZ:-America/Denver}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.advisor.rule=Host(`advisor.holygrail`)
      - traefik.http.routers.advisor.entrypoints=web
      - traefik.http.services.advisor.loadbalancer.server.port=80
    networks:
      - advisor
      - holygrail-proxy

volumes:
  advisor_pgdata:

networks:
  advisor:
  holygrail-proxy:
    external: true
